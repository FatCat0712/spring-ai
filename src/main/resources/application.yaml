spring:
  application:
    name: openai
  config:
    import: optional:file:./.env[.properties]
  ai:
#    openai:
#      api-key: ${OPENAI_API_KEY}
    model:
      chat: ollama
    ollama:
      chat:
        options:
          model: llama3.2:1b

logging:
  pattern:
    console: '%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n'
